<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner Offline</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0b1220;
    color: white;
}
#reader {
    width: 300px;
    margin: auto;
    margin-top: 20px;
    border: 2px solid #00ffcc;
}
#result {
    margin-top: 20px;
    color: #00ffcc;
}
</style>

<!-- ✅ LOCAL FILE (NO INTERNET REQUIRED) -->
<script src="./html5-qrcode.min.js"></script>

</head>

<body>

<h2>QR Attendance Scanner</h2>

<div id="reader"></div>
<div id="result">Waiting for scan...</div>

<script>
window.onload = function () {

    if (typeof Html5Qrcode === "undefined") {
        alert("Library load nahi hui. File path check karo.");
        return;
    }

    const qr = new Html5Qrcode("reader");

    qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (text) => {
            document.getElementById("result").innerText = text;

            qr.stop();
        },
        (err) => {}
    ).catch(err => {
        alert("Camera error: " + err);
    });

};
</script>

</body>
</html>
