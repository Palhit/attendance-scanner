<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
  transition:0.3s;
}

#reader{
  width:300px;
  margin:auto;
  margin-top:20px;
  display:none;
}

#result{
  margin:20px auto;
  font-size:22px;
  font-weight:bold;
  padding:20px;
  border-radius:12px;
  background:white;
  width:80%;
  min-height:60px;
}

button{
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.success{ background:#d4edda !important; color:#155724; }
.error{ background:#f8d7da !important; color:#721c24; }
.warning{ background:#fff3cd !important; color:#856404; }
</style>
</head>

<body>

<h2>Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">Ready to Scan</div>

<button onclick="startScanner()">Start Scanner</button>

<script>

let scanner = null;
let isProcessing = false;
let scanCount = {};

function flash(type){

  if(navigator.vibrate){
    if(type==="success") navigator.vibrate(100);
    if(type==="warning") navigator.vibrate([200,100,200]);
    if(type==="error") navigator.vibrate(400);
  }

  document.body.style.background =
    type==="success" ? "#d4edda" :
    type==="warning" ? "#fff3cd" :
    type==="error" ? "#f8d7da" : "#f4f4f4";

  setTimeout(()=>document.body.style.background="#f4f4f4",300);
}

function show(msg,type){

  let box=document.getElementById("result");
  box.innerHTML=msg;
  box.className=type||"";
}

async function startScanner(){

  try{

    document.getElementById("reader").style.display="block";

    if(!scanner){
      scanner = new Html5Qrcode("reader");
    }

    const devices = await Html5Qrcode.getCameras();

    if(!devices || devices.length===0){
      show("❌ No Camera Found","error");
      flash("error");
      return;
    }

    const cameraId = devices[0].id;

    // IMPORTANT: safe restart
    try{
      await scanner.stop();
    }catch(e){}

    await scanner.start(
      cameraId,
      {
        fps:10,
        qrbox:250
      },
      onScanSuccess
    );

    show("📷 Camera Active - Scan Now","success");

  }catch(err){
    show("❌ Camera Error: "+err.message,"error");
    flash("error");
  }
}

function onScanSuccess(decodedText){

  if(isProcessing) return;
  isProcessing = true;

  let emp = String(decodedText || "").trim();

  if(!emp){
    show("❌ Invalid QR","error");
    flash("error");
    isProcessing=false;
    return;
  }

  scanCount[emp] = (scanCount[emp] || 0) + 1;

  scanner.stop().catch(()=>{});

  show("⏳ Processing...");

  fetch("https://script.google.com/macros/s/1x0igHVQRvOhNFx-YqVxE6XSV7hShp7ssM5xNvH5rJk0/exec?emp="
    + encodeURIComponent(emp))
  .then(r=>r.text())
  .then(msg=>{

    let type="success";

    if(msg.includes("Missing") || msg.includes("Error")) type="error";
    else if(scanCount[emp] >= 3) type="warning";

    show(msg,type);
    flash(type);

    setTimeout(()=>{
      isProcessing=false;
      startScanner();
    },1500);

  })
  .catch(()=>{

    show("❌ Network Error","error");
    flash("error");

    setTimeout(()=>{
      isProcessing=false;
      startScanner();
    },2000);

  });

}

</script>

</body>
</html>
