<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.10/minified/html5-qrcode.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px;
    background:#f5f5f5;
    transition:0.3s;
}

h2{
    color:#333;
}

#reader{
    width:320px;
    margin:auto;
    display:none;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:120px;
    line-height:1.6;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#scanBtn{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

.success{ background:#d4edda !important; }
.error{ background:#f8d7da !important; }
.warning{ background:#fff3cd !important; }

</style>
</head>

<body>

<h2>Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">🟢 Ready For Attendance</div>

<br>

<button id="scanBtn" onclick="startScanner()">📷 Scan Employee</button>

<script>

let html5QrCode;
let isProcessing = false;
let scanCount = {};

function feedback(type){

    // vibration
    if(navigator.vibrate){
        if(type==="success") navigator.vibrate(100);
        if(type==="warning") navigator.vibrate([200,100,200]);
        if(type==="error") navigator.vibrate(400);
    }

    // background flash
    if(type==="success") document.body.style.background = "#d4edda";
    if(type==="warning") document.body.style.background = "#fff3cd";
    if(type==="error") document.body.style.background = "#f8d7da";

    setTimeout(()=>{
        document.body.style.background = "#f5f5f5";
    },300);
}

function setResult(msg,type){

    let box = document.getElementById("result");
    box.innerHTML = msg;

    box.className = "";
    if(type) box.classList.add(type);
}

function startScanner(){

    document.getElementById("reader").style.display = "block";
    document.getElementById("scanBtn").style.display = "none";

    if(!html5QrCode){
        html5QrCode = new Html5Qrcode("reader");
    }

    Html5Qrcode.getCameras().then(devices => {

        if(!devices || devices.length===0){
            setResult("❌ No Camera Found","error");
            feedback("error");
            return;
        }

        let cameraId = devices[0].id;

        html5QrCode.start(
            cameraId,
            { fps:10, qrbox:250 },
            onScanSuccess
        );

        setResult("Scanning...");

    }).catch(err=>{
        setResult("❌ Camera Error","error");
        feedback("error");
    });
}

function onScanSuccess(decodedText){

    if(isProcessing) return;
    isProcessing = true;

    let emp = String(decodedText || "").trim();

    if(!emp){
        setResult("❌ Invalid QR","error");
        feedback("error");
        isProcessing = false;
        return;
    }

    scanCount[emp] = (scanCount[emp] || 0) + 1;

    html5QrCode.stop().catch(()=>{});

    setResult("⏳ Processing...");

    fetch("https://script.google.com/macros/s/1x0igHVQRvOhNFx-YqVxE6XSV7hShp7ssM5xNvH5rJk0/exec?emp=" + encodeURIComponent(emp))
    .then(res => res.text())
    .then(msg => {

        let type = "success";

        if(msg.includes("Missing") || msg.includes("Error") || msg.includes("Not Found")){
            type = "error";
        }
        else if(scanCount[emp] >= 3){
            type = "warning";
        }

        setResult(msg, type);
        feedback(type);

        setTimeout(()=>{
            isProcessing = false;
            startScanner();
        },1500);

    })
    .catch(err=>{

        setResult("❌ Network Error","error");
        feedback("error");

        setTimeout(()=>{
            isProcessing = false;
            startScanner();
        },2000);

    });

}

window.onload = function(){
    document.getElementById("reader").style.display = "none";
    setResult("🟢 Ready For Attendance");
};

</script>

</body>
</html>
