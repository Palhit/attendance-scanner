<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Fix</title>

</head>

<body>

<h2>Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">Loading scanner...</div>

<button onclick="startScanner()">Start Scanner</button>

<!-- 🔥 IMPORTANT: SCRIPT AT BOTTOM (NOT HEAD) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"></script>

<script>

let scanner;
let isProcessing=false;

function show(msg){
  document.getElementById("result").innerHTML=msg;
}

// 🔴 CHECK IF LOADED
window.onload=function(){

  if(typeof Html5Qrcode === "undefined"){
    show("❌ Library Not Loaded (CDN blocked)");
    return;
  }

  show("Ready to Scan");
}

async function startScanner(){

  try{

    if(typeof Html5Qrcode === "undefined"){
      show("❌ Html5Qrcode not loaded");
      return;
    }

    if(!scanner){
      scanner=new Html5Qrcode("reader");
    }

    const devices=await Html5Qrcode.getCameras();

    if(!devices || devices.length===0){
      show("❌ No Camera Found");
      return;
    }

    const cameraId=devices[0].id;

    await scanner.start(
      cameraId,
      {fps:10, qrbox:250},
      onScanSuccess
    );

    show("📷 Camera Started");

  }catch(err){
    console.log(err);
    show("❌ Error: "+err.message);
  }
}

function onScanSuccess(text){

  if(isProcessing) return;
  isProcessing=true;

  scanner.stop().catch(()=>{});

  show("⏳ Processing...");

  fetch("https://script.google.com/macros/s/1x0igHVQRvOhNFx-YqVxE6XSV7hShp7ssM5xNvH5rJk0/exec?emp="+text)
  .then(r=>r.text())
  .then(msg=>{

    show(msg);

    setTimeout(()=>{
      isProcessing=false;
      startScanner();
    },1500);

  })
  .catch(()=>{

    show("❌ Network Error");

    setTimeout(()=>{
      isProcessing=false;
      startScanner();
    },2000);

  });

}

</script>

</body>
</html>
