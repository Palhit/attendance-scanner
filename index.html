<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

h2{
  color:#333;
}

#reader{
  width:320px;
  margin:auto;
}

button{
  padding:12px 24px;
  font-size:18px;
  cursor:pointer;
  margin:15px;
}

#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
  min-height:120px;
  line-height:1.6;
}
</style>
</head>

<body>

<h2>Attendance Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>

<div id="reader"></div>

<div id="result">🟢 Ready For First Scan</div>

<script>

let html5QrCode;
let isProcessing = false;

function onScanSuccess(decodedText){

  if(isProcessing) return;

  isProcessing = true;

  html5QrCode.stop();

  document.getElementById("result").innerHTML =
    "⏳ Processing Attendance...";

  fetch(
    "https://script.google.com/macros/s/AKfycbwLyHobkWtJJvgM4ybRw7kzYKcHf_v--xxc9iMecYSVITrVMgUDxjPUcELExuD0LRmNSQ/exec?emp="
    + encodeURIComponent(decodedText)
  )
  .then(response => response.text())
  .then(data => {

    let countdown = 3;

    document.getElementById("result").innerHTML =
      "✅ " + data +
      "<br><br>Next Scan Available In: " +
      countdown;

    const timer = setInterval(() => {

      countdown--;

      if(countdown > 0){

        document.getElementById("result").innerHTML =
          "✅ " + data +
          "<br><br>Next Scan Available In: " +
          countdown;

      }else{

        clearInterval(timer);

        document.getElementById("result").innerHTML =
          "🟢 Ready For Next Scan";

        startScanner();

        isProcessing = false;
      }

    },1000);

  })
  .catch(error => {

    console.error(error);

    document.getElementById("result").innerHTML =
      "❌ Attendance Save Failed";

    setTimeout(() => {

      document.getElementById("result").innerHTML =
        "🟢 Ready For Next Scan";

      startScanner();

      isProcessing = false;

    },3000);

  });

}

function startScanner(){

  if(!html5QrCode){
    html5QrCode = new Html5Qrcode("reader");
  }

  Html5Qrcode.getCameras()
  .then(devices => {

    if(!devices || devices.length === 0){
      alert("No Camera Found");
      return;
    }

    const cameraId =
      devices.find(device =>
        device.label.toLowerCase().includes("back")
      )?.id || devices[0].id;

    html5QrCode.start(
      cameraId,
      {
        fps:10,
        qrbox:250
      },
      onScanSuccess
    );

  })
  .catch(err => {
    alert("Camera Error: " + err);
  });

}

</script>

</body>
</html>
