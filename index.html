<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance Scanner</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
    text-align: center;
}

h2 {
    margin-top: 15px;
}

#reader {
    width: 300px;
    margin: 20px auto;
    border: 2px solid #00ffcc;
    border-radius: 10px;
    overflow: hidden;
}

#result {
    margin-top: 15px;
    font-size: 18px;
    color: #00ffcc;
}
</style>

<!-- ✅ CDN FALLBACK LOADER (YAHI HEAD ME HOTA HAI) -->
<script>
function loadScript(src, fallback) {
    const s = document.createElement("script");
    s.src = src;

    s.onload = () => {
        console.log("Loaded:", src);
        startScanner(); // library load hone ke baad scanner start
    };

    s.onerror = () => {
        console.log("Failed:", src);
        if (fallback) fallback();
    };

    document.head.appendChild(s);
}

// Try multiple CDNs
loadScript(
    "https://unpkg.com/html5-qrcode",
    () => loadScript(
        "https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/minified/html5-qrcode.min.js",
        () => loadScript(
            "https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js",
            () => alert("QR Library load failed. Internet issue.")
        )
    )
);
</script>

</head>

<body>

<h2>📷 QR Attendance Scanner</h2>

<div id="reader"></div>
<div id="result">Scan result yahan dikhega</div>

<script>
function startScanner() {

    if (typeof Html5Qrcode === "undefined") {
        alert("Library load nahi hui");
        return;
    }

    const qr = new Html5Qrcode("reader");

    qr.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        (decodedText) => {
            document.getElementById("result").innerText = "Result: " + decodedText;

            // optional: stop after scan
            qr.stop().then(() => {
                console.log("Scanner stopped");
            });

        },
        (error) => {
            // scanning errors ignore
        }
    ).catch(err => {
        console.log("Camera error:", err);
        alert("Camera start nahi ho raha: " + err);
    });
}
</script>

</body>
</html>
