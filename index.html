<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px;
    background:#f5f5f5;
}

h2{
    color:#333;
}

#reader{
    width:320px;
    margin:auto;
    display:none;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    min-height:120px;
    line-height:1.6;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#scanBtn{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">
🟢 Ready For Attendance
</div>

<br>

<button id="scanBtn" onclick="startScanner()">
📷 Scan Employee
</button>

<script>

let html5QrCode;
let isProcessing = false;

function playBeep(){
    try{
        const audio = new Audio(
          "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
        );
        audio.play();
    }catch(e){}
}

function onScanSuccess(decodedText){

    if(isProcessing) return;

    isProcessing = true;

    html5QrCode.stop().catch(()=>{});

    document.getElementById("result").innerHTML =
      "⏳ Processing Attendance...";

    fetch(
      "https://script.google.com/macros/s/AKfycbwLyHobkWtJJvgM4ybRw7kzYKcHf_v--xxc9iMecYSVITrVMgUDxjPUcELExuD0LRmNSQ/exec?emp="
      + encodeURIComponent(decodedText)
    )

    .then(response => response.text())

    .then(data => {

        playBeep();

        let countdown = 3;

        document.getElementById("result").innerHTML =
          "✅ " + data +
          "<br><br>Next Employee Scan In : " +
          countdown;

        const timer = setInterval(() => {

            countdown--;

            if(countdown > 0){

                document.getElementById("result").innerHTML =
                  "✅ " + data +
                  "<br><br>Next Employee Scan In : " +
                  countdown;

            }else{

                clearInterval(timer);

                document.getElementById("reader").style.display = "none";

                document.getElementById("result").innerHTML =
                  "🟢 Ready For Next Employee";

                document.getElementById("scanBtn").style.display =
                  "inline-block";

                isProcessing = false;
            }

        },1000);

    })

    .catch(error => {

        console.error(error);

        document.getElementById("result").innerHTML =
          "❌ Attendance Save Failed";

        setTimeout(() => {

            document.getElementById("reader").style.display = "none";

            document.getElementById("result").innerHTML =
              "🟢 Ready For Next Employee";

            document.getElementById("scanBtn").style.display =
              "inline-block";

            isProcessing = false;

        },3000);

    });

}

function startScanner(){

    document.getElementById("reader").style.display = "block";

    document.getElementById("scanBtn").style.display = "none";

    if(!html5QrCode){
        html5QrCode = new Html5Qrcode("reader");
    }

    Html5Qrcode.getCameras()

    .then(devices => {

        if(!devices || devices.length === 0){

            document.getElementById("result").innerHTML =
              "❌ No Camera Found";

            document.getElementById("scanBtn").style.display =
              "inline-block";

            return;
        }

        const cameraId =
          devices.find(device =>
            device.label.toLowerCase().includes("back")
          )?.id || devices[0].id;

        html5QrCode.start(
            cameraId,
            {
                fps:10,
                qrbox:250
            },
            onScanSuccess
        );

    })

    .catch(err => {

        document.getElementById("result").innerHTML =
          "❌ Camera Error : " + err;

        document.getElementById("scanBtn").style.display =
          "inline-block";

    });

}

window.onload = function(){

    document.getElementById("reader").style.display = "none";

    document.getElementById("result").innerHTML =
      "🟢 Ready For Attendance";

};

</script>

</body>
</html>
