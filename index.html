<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner Pro</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    text-align:center;
}

#reader{
    width:320px;
    margin:20px auto;
    border:2px solid #00ffcc;
    border-radius:10px;
    padding:10px;
    background:#111;
}

button{
    padding:10px 15px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>QR Scanner Pro (Fallback CDN)</h2>

<div id="reader"></div>

<div id="status">Loading scanner...</div>

<button onclick="startScanner()">Start Scan</button>

<script>
let scriptLoaded = false;

// Multiple CDN fallback system
const cdnList = [
  "https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/minified/html5-qrcode.min.js",
  "https://unpkg.com/html5-qrcode@2.3.10/minified/html5-qrcode.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"
];

function loadScript(index){
    if(index >= cdnList.length){
        document.getElementById("status").innerText =
        "❌ All CDNs failed. Check internet or use local file.";
        return;
    }

    let script = document.createElement("script");
    script.src = cdnList[index];

    script.onload = () => {
        scriptLoaded = true;
        document.getElementById("status").innerText =
        "✅ Scanner library loaded";
        console.log("Loaded from:", cdnList[index]);
    };

    script.onerror = () => {
        console.log("Failed:", cdnList[index]);
        loadScript(index + 1);
    };

    document.head.appendChild(script);
}

// start loading chain
loadScript(0);

let html5QrCode;

function startScanner(){

    if(!scriptLoaded || typeof Html5Qrcode === "undefined"){
        alert("Scanner library not loaded yet. Wait...");
        return;
    }

    if(html5QrCode){
        html5QrCode.stop().then(()=>html5QrCode.clear());
    }

    html5QrCode = new Html5Qrcode("reader");

    const config = { fps: 10, qrbox: 250 };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
            document.getElementById("status").innerText =
            "✅ Scanned: " + decodedText;

            console.log("QR:", decodedText);
        },
        (errorMessage) => {
            // silent errors
        }
    ).catch(err => {
        document.getElementById("status").innerText =
        "❌ Camera error: " + err;
    });
}
</script>

</body>
</html>
