<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Scanner</title>

<!-- STABLE CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

#reader{
  width:300px;
  margin:auto;
  margin-top:20px;
  display:none;
}

#result{
  margin:20px auto;
  font-size:20px;
  font-weight:bold;
  padding:15px;
  border-radius:10px;
  background:white;
  width:80%;
  min-height:60px;
}

button{
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">Ready to Scan</div>

<button onclick="startScanner()">Start Scanner</button>

<script>

let scanner;
let isProcessing = false;

function show(msg){
  document.getElementById("result").innerHTML = msg;
}

// 🔴 safety check (IMPORTANT)
window.onload = function(){
  if(typeof Html5Qrcode === "undefined"){
    alert("Library load nahi hui. Internet ya CDN issue hai.");
  }
}

async function startScanner(){

  try{

    document.getElementById("reader").style.display = "block";

    if(typeof Html5Qrcode === "undefined"){
      show("❌ Library Not Loaded");
      return;
    }

    if(!scanner){
      scanner = new Html5Qrcode("reader");
    }

    const devices = await Html5Qrcode.getCameras();

    if(!devices || devices.length === 0){
      show("❌ No Camera Found");
      return;
    }

    const cameraId = devices[0].id;

    await scanner.start(
      cameraId,
      { fps:10, qrbox:250 },
      onScanSuccess
    );

    show("📷 Camera Started");

  }catch(err){
    console.log(err);
    show("❌ Camera Error: " + err.message);
  }
}

function onScanSuccess(decodedText){

  if(isProcessing) return;
  isProcessing = true;

  let emp = (decodedText || "").trim();

  if(!emp){
    show("❌ Invalid QR");
    isProcessing = false;
    return;
  }

  scanner.stop().catch(()=>{});

  show("⏳ Processing...");

  fetch("https://script.google.com/macros/s/1x0igHVQRvOhNFx-YqVxE6XSV7hShp7ssM5xNvH5rJk0/exec?emp="
    + encodeURIComponent(emp))
  .then(r => r.text())
  .then(msg => {

    show(msg);

    setTimeout(()=>{
      isProcessing = false;
      startScanner();
    },1500);

  })
  .catch(()=>{

    show("❌ Network Error");

    setTimeout(()=>{
      isProcessing = false;
      startScanner();
    },2000);

  });

}

</script>

</body>
</html>
