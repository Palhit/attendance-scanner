<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Scanner Pro</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

h2{ margin-top:10px; }

#reader{
    width:320px;
    margin:auto;
    display:none;
    border-radius:10px;
    overflow:hidden;
}

#result{
    margin-top:20px;
    font-size:18px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    min-height:80px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>

<!-- ✅ FIXED CDN (PRIMARY) -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/minified/html5-qrcode.min.js"></script>

</head>

<body>

<h2>📷 QR Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">🟢 Ready to Scan</div>

<br>

<button id="scanBtn" onclick="startScanner()">Start Scan</button>

<script>

let scanner;
let isRunning = false;

function beep(){
    try{
        let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
        audio.play();
    }catch(e){}
}

function onScanSuccess(text){

    if(isRunning) return;
    isRunning = true;

    scanner.stop().catch(()=>{});

    document.getElementById("result").innerHTML =
        "⏳ Processing: " + text;

    fetch("https://script.google.com/macros/s/AKfycbwLyHobkWtJJvgM4ybRw7kzYKcHf_v--xxc9iMecYSVITrVMgUDxjPUcELExuD0LRmNSQ/exec?emp=" + encodeURIComponent(text))

    .then(res => res.text())

    .then(data => {

        beep();

        document.getElementById("result").innerHTML =
            "✅ " + data + "<br><br>Next scan in 3 sec";

        let t = 3;

        let timer = setInterval(()=>{

            t--;

            if(t <= 0){
                clearInterval(timer);

                document.getElementById("reader").style.display = "none";
                document.getElementById("scanBtn").style.display = "inline-block";
                document.getElementById("result").innerHTML = "🟢 Ready to Scan";

                isRunning = false;
            }
            else{
                document.getElementById("result").innerHTML =
                    "✅ " + data + "<br><br>Next scan in " + t + " sec";
            }

        },1000);

    })

    .catch(err=>{
        document.getElementById("result").innerHTML =
            "❌ Error saving attendance";
        isRunning = false;
    });
}

function startScanner(){

    if(typeof Html5Qrcode === "undefined"){
        document.getElementById("result").innerHTML =
            "❌ QR Library not loaded (internet issue)";
        return;
    }

    document.getElementById("reader").style.display = "block";
    document.getElementById("scanBtn").style.display = "none";

    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {

        if(!devices || devices.length === 0){
            document.getElementById("result").innerHTML = "❌ No Camera Found";
            return;
        }

        let cameraId = devices[0].id;

        scanner.start(
            cameraId,
            {
                fps:10,
                qrbox:250
            },
            onScanSuccess
        );

    }).catch(err=>{
        document.getElementById("result").innerHTML =
            "❌ Camera Error: " + err;
    });
}

</script>

</body>
</html>
