<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Scanner</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

h2{
  margin-top:15px;
}

#reader{
  width:320px;
  margin:auto;
  margin-top:20px;
}

#result{
  margin:20px auto;
  padding:15px;
  background:white;
  width:85%;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
}
button{
  padding:12px 18px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📷 Attendance Scanner</h2>

<div id="reader"></div>

<div id="result">Ready to Scan</div>

<button onclick="startScanner()">Start Scanner</button>

<!-- ✅ IMPORTANT: LIBRARY LOAD HERE (BODY END BEST) -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scanner;
let isProcessing = false;

// 🔵 SHOW MESSAGE
function show(msg){
  document.getElementById("result").innerHTML = msg;
}

// 🔵 START SCANNER
async function startScanner(){

  try{

    // 🔴 SAFETY CHECK
    if(typeof Html5Qrcode === "undefined"){
      show("❌ Library Not Loaded (CDN blocked)");
      return;
    }

    if(!scanner){
      scanner = new Html5Qrcode("reader");
    }

    const devices = await Html5Qrcode.getCameras();

    if(!devices || devices.length === 0){
      show("❌ No Camera Found");
      return;
    }

    // BACK CAMERA PRIORITY
    let cameraId = devices[0].id;

    for(let d of devices){
      if(d.label.toLowerCase().includes("back")){
        cameraId = d.id;
        break;
      }
    }

    await scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );

    show("📷 Scanning...");

  }catch(err){
    show("❌ Camera Error: " + err.message);
  }
}

// 🔵 QR SCAN SUCCESS + BACKEND CALL
function onScanSuccess(decodedText){

  if(isProcessing) return;
  isProcessing = true;

  let emp = String(decodedText || "").trim();

  if(!emp){
    show("❌ Invalid QR");
    isProcessing = false;
    return;
  }

  scanner.stop().catch(()=>{});

  show("⏳ Processing...");

  // 🔥 YOUR GOOGLE SCRIPT API
  fetch("https://script.google.com/macros/s/1x0igHVQRvOhNFx-YqVxE6XSV7hShp7ssM5xNvH5rJk0/exec?emp=" + encodeURIComponent(emp))
  .then(res => res.text())
  .then(msg => {

    show(msg);

    setTimeout(()=>{
      isProcessing = false;
      startScanner();
    },1500);

  })
  .catch(err => {

    show("❌ Network Error: " + err.message);

    setTimeout(()=>{
      isProcessing = false;
      startScanner();
    },2000);

  });

}

</script>

</body>
</html>
